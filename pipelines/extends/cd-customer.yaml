# Whole-pipeline (extends) template — the ONE shared structure for every customer CD.
#
# Per docs/adr/pipelines/pipeline-naming-and-placement.md, customer CD is the sanctioned large-template
# case: every customer's thin pipeline (cd-apex.yaml, cd-nova.yaml, cd-flux.yaml) `extends:` this file
# and supplies only meta selection criteria — the customer key and the per-deployment env/slot/
# service-connection/assert map. No automation config is needled through (custom-template-discipline.md).
#
# The deploy TARGET is the az session's subscription — exactly what each entry's service connection logs
# into (docs/adr/azure/azure-data-model.md). Nothing chains a subscription name; instead every entry pins its
# expectation with `subscriptionIdAssertIs` (mandatory in a pipeline), so a mis-wired service connection
# fails loudly instead of silently retargeting. The customer that renders into names is derived from the
# session subscription, and the session's customer picks the configuration/<customer>/ slot.
#
# CD = CI + CD: the CI stage builds + publishes the immutable artifacts (filtered to this customer's
# configuration subfolder via -Customers), then the deploy stages apply them in dependency order —
# foundation -> discovery -> expedition. foundation owns the per-subscription Key Vault that
# discovery/expedition reference, so it deploys first (dependsOn).
#
# The three flat lists render cleanly with ${{ each }} — one deployment job per entry. Each entry
# carries its own serviceConnection (tier -> SC: the nonprod sub serves nsub/dev/test, the prod sub
# serves psub/preprod/prod) plus the matching subscriptionIdAssertIs GUID from azure.yml. Reference
# shapes only: real service connections + a non-placeholder azure.yml are required to actually deploy.
#
# Triggers live in the thin root pipelines that extend this template — `trigger:` / `pr:` are honored
# only at the pipeline root, not inside an extends template.

parameters:
  - name: Customer
    type: string
  - name: Foundations
    type: object # [ {env: nsub, serviceConnection: sc-<owner>-nonprod, subscriptionIdAssertIs: <guid>}, {env: psub, ...} ]
  - name: Discoveries
    type: object # [ {env: dev, serviceConnection: sc-<owner>-nonprod, subscriptionIdAssertIs: <guid>}, ... ]
  - name: Expeditions
    type: object # [ {env: dev, slot: '001', serviceConnection: sc-<owner>-nonprod, subscriptionIdAssertIs: <guid>}, ... ]

stages:
  # --- CI engine: build this customer's slots + publish the immutable artifacts -------------------
  - stage: CI
    displayName: "CI engine — build & verify (${{ parameters.Customer }})"
    jobs:
      - job: Build
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          # Build only this customer's configuration subfolder (build-once). The customer key IS the
          # folder, so -Customers needs no subscription names and tolerates an absent tier.
          - template: /pipelines/steps/invoke-automation.yaml
            parameters:
              DisplayName: "Build-Bicep foundation -Customers ${{ parameters.Customer }}"
              RunCommand: "Build-Bicep foundation -Customers ${{ parameters.Customer }}"
          - publish: out/template/foundation
            artifact: foundation

          - template: /pipelines/steps/invoke-automation.yaml
            parameters:
              DisplayName: "Build-Bicep discovery -Customers ${{ parameters.Customer }}"
              RunCommand: "Build-Bicep discovery -Customers ${{ parameters.Customer }}"
          - publish: out/template/discovery
            artifact: discovery

          - template: /pipelines/steps/invoke-automation.yaml
            parameters:
              DisplayName: "Build-Bicep expedition -Customers ${{ parameters.Customer }}"
              RunCommand: "Build-Bicep expedition -Customers ${{ parameters.Customer }}"
          - publish: out/template/expedition
            artifact: expedition

  # --- Deploy foundation (per-subscription Key Vault) — main only --------------------------------
  - stage: Deploy_Foundation
    displayName: "Deploy foundation (${{ parameters.Customer }})"
    dependsOn: CI
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - ${{ each f in parameters.Foundations }}:
          - deployment: Foundation_${{ f.env }}
            displayName: "foundation → ${{ f.env }}"
            environment: ${{ parameters.Customer }}-${{ f.env }}
            pool:
              vmImage: ubuntu-latest
            strategy:
              runOnce:
                deploy:
                  steps:
                    - checkout: self
                    - download: current
                      artifact: foundation
                    - template: /pipelines/steps/invoke-automation.yaml
                      parameters:
                        DisplayName: "Deploy-Bicep ${{ f.env }} foundation (session target, assert ${{ f.subscriptionIdAssertIs }})"
                        Mode: azcli
                        ServiceConnection: ${{ f.serviceConnection }}
                        RunCommand:
                          'Deploy-Bicep -Environment ${{ f.env }} -Template foundation -SubscriptionIdAssertIs ${{ f.subscriptionIdAssertIs
                          }} -ArtifactsFolder "$(Pipeline.Workspace)/foundation"'

  # --- Deploy discovery (reads the foundation Key Vault) — after foundation, main only ------------
  - stage: Deploy_Discovery
    displayName: "Deploy discovery (${{ parameters.Customer }})"
    dependsOn: Deploy_Foundation
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - ${{ each e in parameters.Discoveries }}:
          - deployment: Discovery_${{ e.env }}
            displayName: "discovery → ${{ e.env }}"
            environment: ${{ parameters.Customer }}-${{ e.env }}
            pool:
              vmImage: ubuntu-latest
            strategy:
              runOnce:
                deploy:
                  steps:
                    - checkout: self
                    - download: current
                      artifact: discovery
                    - template: /pipelines/steps/invoke-automation.yaml
                      parameters:
                        DisplayName: "Deploy-Bicep ${{ e.env }} discovery (session target, assert ${{ e.subscriptionIdAssertIs }})"
                        Mode: azcli
                        ServiceConnection: ${{ e.serviceConnection }}
                        RunCommand:
                          'Deploy-Bicep -Environment ${{ e.env }} -Template discovery -SubscriptionIdAssertIs ${{ e.subscriptionIdAssertIs
                          }} -ArtifactsFolder "$(Pipeline.Workspace)/discovery"'

  # --- Deploy expedition (slotted; reads the foundation Key Vault) — after discovery, main only ---
  - stage: Deploy_Expedition
    displayName: "Deploy expedition (${{ parameters.Customer }})"
    dependsOn: Deploy_Discovery
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - ${{ each w in parameters.Expeditions }}:
          - deployment: Expedition_${{ w.env }}_${{ w.slot }}
            displayName: "expedition → ${{ w.env }}-${{ w.slot }}"
            environment: ${{ parameters.Customer }}-${{ w.env }}-${{ w.slot }}
            pool:
              vmImage: ubuntu-latest
            strategy:
              runOnce:
                deploy:
                  steps:
                    - checkout: self
                    - download: current
                      artifact: expedition
                    - template: /pipelines/steps/invoke-automation.yaml
                      parameters:
                        DisplayName:
                          "Deploy-Bicep ${{ w.env }} expedition -Slot ${{ w.slot }} (session target, assert ${{ w.subscriptionIdAssertIs }})"
                        Mode: azcli
                        ServiceConnection: ${{ w.serviceConnection }}
                        RunCommand:
                          'Deploy-Bicep -Environment ${{ w.env }} -Template expedition -Slot ${{ w.slot }} -SubscriptionIdAssertIs ${{
                          w.subscriptionIdAssertIs }} -ArtifactsFolder "$(Pipeline.Workspace)/expedition"'
