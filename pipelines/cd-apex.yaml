# CD pipeline for customer apex — thin root that extends the shared customer CD template.
#
# Supplies only meta selection criteria: the customer key and the per-deployment env/slot/service-
# connection/assert map. All structure (CI build, foundation -> discovery -> expedition ordering) lives
# in /pipelines/extends/cd-customer.yaml. apex has both tiers — nonprod (nsub/dev/test) and prod
# (psub/preprod/prod). The target subscription is what each service connection logs into; the
# subscriptionIdAssertIs GUID (from azure.yml) pins it. Triggers live here because they are honored
# only at the pipeline root.
#
# Reference shape: 'sc-apex-*' are illustrative until real service connections + a non-placeholder
# azure.yml exist.

# Trigger = the 'apex' globset projected into ADO-native path filters (Get-GlobSetTrigger, ADR-FLOW-CD-GLOBS):
# the shared foundation + modules, plus apex's own configuration subfolder, minus the other deployments'
# config. A deeper-folder include (configuration/apex/**) over the broader exclude, so ADO keeps it.
trigger:
  branches:
    include: [main]
  paths:
    include:
      - infrastructure/templates/foundation/**
      - infrastructure/modules/**
      - infrastructure/templates/foundation/configuration/apex/**
    exclude:
      - infrastructure/templates/foundation/configuration/*.yml
      - infrastructure/templates/foundation/configuration/*/**

pr:
  branches:
    include: [main]
  paths:
    include:
      - infrastructure/templates/foundation/**
      - infrastructure/modules/**
      - infrastructure/templates/foundation/configuration/apex/**
    exclude:
      - infrastructure/templates/foundation/configuration/*.yml
      - infrastructure/templates/foundation/configuration/*/**

extends:
  template: /pipelines/extends/cd-customer.yaml
  parameters:
    Customer: apex
    Foundations:
      - { env: nsub, serviceConnection: sc-apex-nonprod, subscriptionIdAssertIs: a0e00000-de00-50b0-0000-000000000000 }
      - { env: psub, serviceConnection: sc-apex-prod, subscriptionIdAssertIs: a0e00000-000d-50b0-0000-000000000000 }
    Discoveries:
      - { env: dev, serviceConnection: sc-apex-nonprod, subscriptionIdAssertIs: a0e00000-de00-50b0-0000-000000000000 }
      - { env: test, serviceConnection: sc-apex-nonprod, subscriptionIdAssertIs: a0e00000-de00-50b0-0000-000000000000 }
      - { env: preprod, serviceConnection: sc-apex-prod, subscriptionIdAssertIs: a0e00000-000d-50b0-0000-000000000000 }
      - { env: prod, serviceConnection: sc-apex-prod, subscriptionIdAssertIs: a0e00000-000d-50b0-0000-000000000000 }
    Expeditions:
      - { env: dev, slot: "001", serviceConnection: sc-apex-nonprod, subscriptionIdAssertIs: a0e00000-de00-50b0-0000-000000000000 }
      - { env: dev, slot: "002", serviceConnection: sc-apex-nonprod, subscriptionIdAssertIs: a0e00000-de00-50b0-0000-000000000000 }
      - { env: test, slot: "001", serviceConnection: sc-apex-nonprod, subscriptionIdAssertIs: a0e00000-de00-50b0-0000-000000000000 }
      - { env: preprod, slot: "001", serviceConnection: sc-apex-prod, subscriptionIdAssertIs: a0e00000-000d-50b0-0000-000000000000 }
      - { env: prod, slot: "001", serviceConnection: sc-apex-prod, subscriptionIdAssertIs: a0e00000-000d-50b0-0000-000000000000 }
