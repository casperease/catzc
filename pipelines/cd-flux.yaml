# CD pipeline for customer flux — thin root that extends the shared customer CD template.
#
# flux is dev-only (nonprod tier only): one foundation per-sub env (nsub), one discovery env (dev), one
# expedition slot (dev-001). Add the prod tier (psub / preprod / prod) when flux grows. All structure
# lives in /pipelines/extends/cd-customer.yaml; triggers live here (honored only at the pipeline root).
# The target subscription is what the service connection logs into; the subscriptionIdAssertIs GUID
# (from azure.yml) pins it.
#
# Reference shape: 'sc-flux-nonprod' is illustrative until real service connections + a non-placeholder
# azure.yml exist.

# Trigger = the 'flux' globset projected into ADO-native path filters (Get-GlobSetTrigger, ADR-GLOBS):
# shared foundation + modules, plus flux's own configuration subfolder, minus the other deployments' config.
trigger:
  branches:
    include: [main]
  paths:
    include:
      - infrastructure/templates/foundation/**
      - infrastructure/modules/**
      - infrastructure/templates/foundation/configuration/flux/**
    exclude:
      - infrastructure/templates/foundation/configuration/*.yml
      - infrastructure/templates/foundation/configuration/*/**

pr:
  branches:
    include: [main]
  paths:
    include:
      - infrastructure/templates/foundation/**
      - infrastructure/modules/**
      - infrastructure/templates/foundation/configuration/flux/**
    exclude:
      - infrastructure/templates/foundation/configuration/*.yml
      - infrastructure/templates/foundation/configuration/*/**

extends:
  template: /pipelines/extends/cd-customer.yaml
  parameters:
    Customer: flux
    Foundations:
      - { env: nsub, serviceConnection: sc-flux-nonprod, subscriptionIdAssertIs: f1000000-de00-50b0-0000-000000000000 }
    Discoveries:
      - { env: dev, serviceConnection: sc-flux-nonprod, subscriptionIdAssertIs: f1000000-de00-50b0-0000-000000000000 }
    Expeditions:
      - { env: dev, slot: "001", serviceConnection: sc-flux-nonprod, subscriptionIdAssertIs: f1000000-de00-50b0-0000-000000000000 }
