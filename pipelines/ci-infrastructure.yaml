# CI pipeline for the infrastructure templates (foundation / discovery / expedition).
#
# CI = the CI engine alone: build + verify, no artifact, no deploy (see
# docs/adr/pipelines/pipeline-types.md). For each template it runs Assert-BicepTemplate (the explicit
# author/CI-facing validation: options.yml schema, env-class + slot classification, identity refs,
# parameter alignment) and then Build-Bicep (compile main.bicep + render every per-slot parameter file +
# run the UNDEFINED gate). Building needs no auth — `az bicep build` is offline — so Mode stays 'none'.
#
# One pipeline covers all three templates; it is fast enough to stay inside the 5-10 min pre-commit
# budget. Revisit per-template CI only if build time grows.
#
# The CI engine runs in two trigger contexts on the same code:
#   - pre-commit  : as an ADO build validation on PRs to main (the gate)
#   - post-commit : the same build + verify on the merged commit
# Both are registered on the 'infrastructure' unit's trigger file, never on source paths (ADR-GLOBS#1).

trigger:
  branches:
    include: [main]
  paths:
    include: [.triggers/infrastructure.sha256]

pr:
  branches:
    include: [main]
  paths:
    include: [.triggers/infrastructure.sha256]

jobs:
  - job: CI
    displayName: 'CI engine — validate & build foundation / discovery / expedition'
    pool:
      vmImage: ubuntu-latest
    steps:
      - checkout: self

      - template: /pipelines/steps/invoke-automation.yaml
        parameters:
          DisplayName: 'Assert-BicepTemplate foundation'
          RunCommand: 'Assert-BicepTemplate foundation'
      - template: /pipelines/steps/invoke-automation.yaml
        parameters:
          DisplayName: 'Build-Bicep foundation (compile + render + verify)'
          RunCommand: 'Build-Bicep foundation'

      - template: /pipelines/steps/invoke-automation.yaml
        parameters:
          DisplayName: 'Assert-BicepTemplate discovery'
          RunCommand: 'Assert-BicepTemplate discovery'
      - template: /pipelines/steps/invoke-automation.yaml
        parameters:
          DisplayName: 'Build-Bicep discovery (compile + render + verify)'
          RunCommand: 'Build-Bicep discovery'

      - template: /pipelines/steps/invoke-automation.yaml
        parameters:
          DisplayName: 'Assert-BicepTemplate expedition'
          RunCommand: 'Assert-BicepTemplate expedition'
      - template: /pipelines/steps/invoke-automation.yaml
        parameters:
          DisplayName: 'Build-Bicep expedition (compile + render + verify)'
          RunCommand: 'Build-Bicep expedition'
