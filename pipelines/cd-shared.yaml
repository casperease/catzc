# CD pipeline for the central / shared subscription (standalone — not a customer).
#
# CD = CI + CD (see docs/adr/pipelines/pipeline-types.md): the SAME CI engine as ci-infrastructure.yaml
# builds the immutable artifacts, then the deploy stages apply them — build-once / deploy-many. The
# shared subscription deploys foundation (the per-subscription Log Analytics + Key Vault) and discovery;
# it has no expedition (expedition is customer-only).
#
# Stage order is the safety property: foundation owns the Key Vault that discovery references, so
# Deploy_Foundation must finish before Deploy_Discovery. Encoded via dependsOn.
#
# Tier -> service connection: sc-shared-nonprod logs into shared_nonprod (serves nsub / dev / test);
# sc-shared-prod into shared_prod (serves psub / preprod / prod). nsub / psub are ordinary -Environment
# values (the per-subscription env class). The deploy TARGET is the az session's subscription — what the
# service connection logged into — and every deploy pins it with -SubscriptionIdAssertIs (mandatory in a
# pipeline — see docs/adr/azure/azure-data-model.md). The shared platform's configs live at the template's
# configuration ROOT, which a non-customer session addresses.
#
# Reference only: deploying requires real Azure service connections and a non-placeholder azure.yml (the
# shipped one has placeholder subscription GUIDs). The 'sc-shared-*' names are illustrative.

# Trigger = the 'shared' globset projected into ADO-native path filters (Get-GlobSetTrigger, ADR-GLOBS):
# shared foundation + modules, plus the configuration-ROOT ymls, minus the customer subfolders. NOTE: on
# ADO's order-independent filter, configuration/*.yml (include) and configuration/*/** (exclude) sit at the
# SAME folder depth, so ADO may drop a root yml (it is not a deeper-folder re-add). The in-pipeline
# Test-GlobSetAffected gate is the exact backstop; the definitive fix is to move the shared platform config
# into its own configuration/_shared/ subfolder (folder=key, like every customer) — deferred (touches the
# Azure data model). GitHub's ordered '!' negation projects this set exactly.
trigger:
  branches:
    include: [main]
  paths:
    include:
      - infrastructure/templates/foundation/**
      - infrastructure/modules/**
      - infrastructure/templates/foundation/configuration/*.yml
    exclude:
      - infrastructure/templates/foundation/configuration/*/**

pr:
  branches:
    include: [main]
  paths:
    include:
      - infrastructure/templates/foundation/**
      - infrastructure/modules/**
      - infrastructure/templates/foundation/configuration/*.yml
    exclude:
      - infrastructure/templates/foundation/configuration/*/**

stages:
  # --- CI engine: build + verify, then publish the immutable artifacts ----------------------------
  - stage: CI
    displayName: "CI engine — build & verify"
    jobs:
      - job: Build
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          # Build-Bicep writes each template to out/template/<name>; publish that as the artifact the
          # deploy stages consume. -Shared scopes the build to the configuration-root (shared platform)
          # slots — customer subfolders are built by their own customer CD.
          - template: /pipelines/steps/invoke-automation.yaml
            parameters:
              DisplayName: "Build-Bicep foundation -Shared"
              RunCommand: "Build-Bicep foundation -Shared"
          - publish: out/template/foundation
            artifact: foundation

          - template: /pipelines/steps/invoke-automation.yaml
            parameters:
              DisplayName: "Build-Bicep discovery -Shared"
              RunCommand: "Build-Bicep discovery -Shared"
          - publish: out/template/discovery
            artifact: discovery

  # --- Deploy foundation (per-subscription Log Analytics + Key Vault) — post-commit on main only ---
  - stage: Deploy_Foundation
    displayName: "Deploy foundation → nsub, psub"
    dependsOn: CI
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: Foundation_nsub
        displayName: "foundation → nsub (nonprod sub)"
        environment: shared-nsub
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - download: current
                  artifact: foundation
                - template: /pipelines/steps/invoke-automation.yaml
                  parameters:
                    DisplayName: "Deploy-Bicep nsub foundation (session target: shared nonprod, asserted)"
                    Mode: azcli
                    ServiceConnection: "sc-shared-nonprod"
                    RunCommand:
                      'Deploy-Bicep -Environment nsub -Template foundation -SubscriptionIdAssertIs 50a0ed00-de00-50b0-0000-000000000000
                      -ArtifactsFolder "$(Pipeline.Workspace)/foundation"'

      - deployment: Foundation_psub
        displayName: "foundation → psub (prod sub)"
        environment: shared-psub
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - download: current
                  artifact: foundation
                - template: /pipelines/steps/invoke-automation.yaml
                  parameters:
                    DisplayName: "Deploy-Bicep psub foundation (session target: shared prod, asserted)"
                    Mode: azcli
                    ServiceConnection: "sc-shared-prod"
                    RunCommand:
                      'Deploy-Bicep -Environment psub -Template foundation -SubscriptionIdAssertIs 50a0ed00-000d-50b0-0000-000000000000
                      -ArtifactsFolder "$(Pipeline.Workspace)/foundation"'

  # --- Deploy discovery (reads the foundation Key Vault) — after foundation, main only -------------
  - stage: Deploy_Discovery
    displayName: "Deploy discovery → dev, test, preprod, prod"
    dependsOn: Deploy_Foundation
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: Discovery_dev
        displayName: "discovery → dev (nonprod sub)"
        environment: shared-dev
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - download: current
                  artifact: discovery
                - template: /pipelines/steps/invoke-automation.yaml
                  parameters:
                    DisplayName: "Deploy-Bicep dev discovery (session target: shared nonprod, asserted)"
                    Mode: azcli
                    ServiceConnection: "sc-shared-nonprod"
                    RunCommand:
                      'Deploy-Bicep -Environment dev -Template discovery -SubscriptionIdAssertIs 50a0ed00-de00-50b0-0000-000000000000
                      -ArtifactsFolder "$(Pipeline.Workspace)/discovery"'

      - deployment: Discovery_test
        displayName: "discovery → test (nonprod sub)"
        environment: shared-test
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - download: current
                  artifact: discovery
                - template: /pipelines/steps/invoke-automation.yaml
                  parameters:
                    DisplayName: "Deploy-Bicep test discovery (session target: shared nonprod, asserted)"
                    Mode: azcli
                    ServiceConnection: "sc-shared-nonprod"
                    RunCommand:
                      'Deploy-Bicep -Environment test -Template discovery -SubscriptionIdAssertIs 50a0ed00-de00-50b0-0000-000000000000
                      -ArtifactsFolder "$(Pipeline.Workspace)/discovery"'

      - deployment: Discovery_preprod
        displayName: "discovery → preprod (prod sub)"
        environment: shared-preprod
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - download: current
                  artifact: discovery
                - template: /pipelines/steps/invoke-automation.yaml
                  parameters:
                    DisplayName: "Deploy-Bicep preprod discovery (session target: shared prod, asserted)"
                    Mode: azcli
                    ServiceConnection: "sc-shared-prod"
                    RunCommand:
                      'Deploy-Bicep -Environment preprod -Template discovery -SubscriptionIdAssertIs 50a0ed00-000d-50b0-0000-000000000000
                      -ArtifactsFolder "$(Pipeline.Workspace)/discovery"'

      - deployment: Discovery_prod
        displayName: "discovery → prod (prod sub)"
        environment: shared-prod
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - download: current
                  artifact: discovery
                - template: /pipelines/steps/invoke-automation.yaml
                  parameters:
                    DisplayName: "Deploy-Bicep prod discovery (session target: shared prod, asserted)"
                    Mode: azcli
                    ServiceConnection: "sc-shared-prod"
                    RunCommand:
                      'Deploy-Bicep -Environment prod -Template discovery -SubscriptionIdAssertIs 50a0ed00-000d-50b0-0000-000000000000
                      -ArtifactsFolder "$(Pipeline.Workspace)/discovery"'
