# VS Code workspace-settings registry — the single authored source for .vscode/settings.json. The settings
# file the editor reads is a managed, COMMITTED copy rendered from this registry by New-VSCodeSettings
# (wired through Build-RootConfig; see rootconfig.yml and docs/adr/repository/generated-root-configs.md) —
# edit THIS file, never settings.json. Explanations live here as comments; the rendered JSON carries only a
# generated-file header (VS Code reads JSONC, so the header is legal).
#
# The `search.exclude` map is COMPLETED at render time: every managed root-config target (rootconfig.yml,
# opted-in) is added automatically, so find-all always hits the source of truth, never a generated copy —
# the editor stays glued to the tooling with no second list to maintain. Authored entries below win over an
# injected key of the same name.
#
# Loaded via Get-Config -Config vscode-settings (raw — free-form VS Code keys; no shape to validate).
settings:
  # Markdown settings (built-in preview)
  markdown.preview.fontFamily: "Consolas, 'Courier New', monospace"
  markdown.styles:
    - .vscode/markdown-preview-dark.css
  markdown.preview.lineHeight: 1.6
  markdown.preview.fontSize: 14
  markdown.preview.scrollPreviewWithEditor: true
  markdown.preview.scrollEditorWithPreview: true
  markdown.preview.markEditorSelection: true

  # Markdown Preview Enhanced settings
  markdown-preview-enhanced.previewTheme: one-dark.css
  markdown-preview-enhanced.codeBlockTheme: one-dark.css

  # PowerShell: use pwsh 7 for the Integrated Console
  powershell.powerShellDefaultVersion: PowerShell (x64)

  # PowerShell: use project PSScriptAnalyzer settings for analysis (squiggles)
  powershell.scriptAnalysis.settingsPath: ./automation/.internal/assets/PSScriptAnalyzerSettings.psd1

  # PowerShell: "Format Document" uses these codeFormatting settings — NOT the psd1 — so they must be
  # kept in sync with PSScriptAnalyzerSettings.psd1, or the formatter and analyzer disagree.
  # Pipeline indentation: match the psd1's PSUseConsistentIndentation PipelineIndentation setting,
  # otherwise the formatter leaves a piped line under-indented and the analyzer flags it.
  powershell.codeFormatting.pipelineIndentationStyle: IncreaseIndentationForFirstPipeline
  # Expand aliases on format — the psd1 enforces PSAvoidUsingCmdletAliases.
  powershell.codeFormatting.autoCorrectAliases: true
  # Leave casing alone — PSUseCorrectCasing is disabled in the psd1 (false positives on Pester params).
  powershell.codeFormatting.useCorrectCasing: false
  # Vertically align hashtable key/value pairs on format. Matches the psd1's PSUseConsistentWhitespace
  # IgnoreAssignmentOperatorInsideHashTable = $true, so the analyzer accepts the aligned '='.
  powershell.codeFormatting.alignPropertyValuePairs: true
  # Break one-line blocks (if ($x) { ... }) across multiple lines on format, so no block keeps its
  # { } on a single line. Matches the psd1's PSPlaceOpenBrace/PSPlaceCloseBrace IgnoreOneLineBlock = $false.
  powershell.codeFormatting.ignoreOneLineBlock: false
  # Honour .editorconfig / 4-space indent; don't let VS Code guess indentation from file contents.
  '[powershell]':
    editor.detectIndentation: false
    editor.tabSize: 4
    editor.insertSpaces: true

  # Exclude vendored modules and generated module manifests from search. Manifests (automation/**/*.psd1)
  # are gitignored build output — canonical by their generator (Bootstrap) — so they are not authored here
  # and should not clutter search. The authored analyzer config lives under automation/.internal/assets and
  # would fall under that glob, so it is explicitly un-excluded (a more specific `false` wins) to keep it
  # searchable and visible. The managed root-config targets are injected into this map at render time.
  search.exclude:
    automation/.vendor: true
    automation/**/*.psd1: true
    automation/.internal/assets/PSScriptAnalyzerSettings.psd1: false

  # Do not watch/reformat generated manifests — they are regenerated by the importer, not hand-edited. The
  # authored analyzer config is hand-edited, so keep watching it (un-exclude past the manifest glob).
  files.watcherExclude:
    '**/automation/**/*.psd1': true
    '**/automation/.internal/assets/PSScriptAnalyzerSettings.psd1': false

  '[markdown]':
    editor.defaultFormatter: esbenp.prettier-vscode
    editor.quickSuggestions:
      comments: 'on'
      strings: 'on'
      other: 'on'
    editor.wordWrap: 'off'

  # Treat LICENSE files as plain text so markdownlint ignores them
  # .yml -> generic YAML, .yaml -> Azure Pipelines YAML
  # .markdownlintignore -> "ignore" (the built-in .gitignore language) so it is treated as a
  # gitignore-syntax ignore file, not as Markdown.
  files.associations:
    '**/LICENSE': plaintext
    '**/*.yml': yaml
    '**/*.yaml': azure-pipelines
    '**/.markdownlintignore': ignore

  # Route *.drawio.png to VS Code's built-in image preview editor (viewType imagePreview.previewEditor, from
  # the bundled media-preview extension) instead of the Draw.io extension's binary custom editor. This is
  # what makes git Compare show a real raw-pixel image diff (side-by-side / slider) instead of the Draw.io
  # tool, which cannot diff. NOTE: the value must be the image-preview viewType, NOT "default" — "default"
  # is the built-in *text* editor and yields "file is binary or uses an unsupported encoding" on a PNG.
  # VS Code has no way to pick an editor by diff-vs-open, so this association also applies to a plain open:
  # double-clicking a .drawio.png shows the image; to EDIT the diagram, right-click -> Reopen Editor With ->
  # "Draw.io (Binary)". Pixels-first was the deliberate call: these diagrams are compared far more than edited.
  workbench.editorAssociations:
    '*.drawio.png': imagePreview.previewEditor

  # Prettier is the .yaml (ADO pipeline) formatter, the same engine Format-Pipelines runs — so the editor
  # and the catzc gate produce byte-identical output (ADR-REPO-FORMAT). `.yaml` is the azure-pipelines language
  # (files.associations above), a custom language prettier-vscode does not format by default, so
  # documentSelectors opts those files in; the language default-formatter then routes Format Document to it.
  # Format-on-save is deliberately OFF — formatting is on demand (Shift+Alt+F) and enforced by the gate.
  prettier.documentSelectors:
    - '**/*.yaml'
  '[azure-pipelines]':
    editor.defaultFormatter: esbenp.prettier-vscode

  # Azure Pipelines extension: validate .yaml against OUR generated schema, not the extension's bundled one.
  # The bundled schema models a step's `task` as a per-task anyOf; offline (never connected to an ADO org)
  # it cannot resolve the real task set and reports every non-matching branch — the spurious "String does
  # not match the pattern of ^PowerShell@2$" warnings. Our schema (source: Catzc.Base.VSCode
  # configs/vscode-pipeline-schema.yml, rendered by New-VSCodePipelineSchema) drops that anyOf and keeps the
  # structural checks worth having. The extension exposes no severity/ignore knob — only this override.
  azure-pipelines.customSchemaFile: ./.vscode/azure-pipelines-schema.json

  # Spell checking — the single repo dictionary lives in /cspell.yml (auto-discovered by Code Spell
  # Checker; the extension is recommended in .vscode/extensions.json).
  cSpell.enabled: true
  # Information = blue squiggle (Error = red, Warning = yellow).
  cSpell.diagnosticLevel: Information
