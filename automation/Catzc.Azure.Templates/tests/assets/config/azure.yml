# Test-only identity fixture for Catzc.Azure.Templates unit tests. Tests redirect config discovery here
# (Mock Resolve-ConfigEntry -ModuleName Catzc.Base.Config -> tests/assets/config/<name>.yml) so logic tests
# own their identity inputs and never depend on the shipped configs/azure.yml. Deliberately distinct names,
# with a DIFFERENT scheme per axis so the axis is obvious at a glance: environments are Greek
# (alpha/beta/gamma/delta), customers are company names (acme/globex). So editing the real azure.yml can
# never change a logic-test outcome. The shipped azure.yml is validated
# separately by tests/Get-Config.Integrity.Tests.ps1.

org: tst

bicep_min_version: "0.30.0"

tenants:
  fixtenant:
    id: fa0e0000-7e0a-0700-1d00-000000000000

# Customer definitions live in the sibling customer.yml fixture (acme/globex); a subscription below binds
# one by naming it in its `customer` field (by key or shortcode).

environments:
  alpha:
    shortcode: al
    region: westeurope
    region_code: weu
  beta:
    shortcode: bt
    region: westeurope
    region_code: weu
  gamma:
    shortcode: gm
    region: westeurope
    region_code: weu
  delta:
    shortcode: dl
    region: westeurope
    region_code: weu
  # Per-subscription envs (per_subscription) for the fixture — nsub (lower/nonprod), psub (upper/prod).
  nsub:
    shortcode: ns
    region: westeurope
    region_code: weu
    per_subscription: true
  psub:
    shortcode: ps
    region: westeurope
    region_code: weu
    per_subscription: true

# Subscriptions (fixture): a non-customer pair (core_lower/core_upper) — the shared platform every
# configuration-ROOT config resolves against (each env is served by exactly one of them) — and a
# customer pair (acme_lower/acme_upper, customer acme) that configuration/acme/ configs resolve
# against. The customer subs overlap the non-customer envs on purpose: the customer axis, not the env,
# separates them (docs/adr/azure/data-model.md).
subscriptions:
  core_lower:
    id: 50a0ed00-de00-50b0-0000-000000000000
    tenant: fixtenant
    environments:
      - alpha
      - beta
      - nsub
  core_upper:
    id: 50a0ed00-000d-50b0-0000-000000000000
    tenant: fixtenant
    environments:
      - gamma
      - delta
      - psub
  acme_lower:
    id: a0e00000-000d-50b0-0000-000000000000
    tenant: fixtenant
    customer: acme
    environments:
      - alpha
      - beta
      - nsub
  acme_upper:
    id: 000a0000-de00-50b0-0000-000000000000
    tenant: fixtenant
    customer: acme
    environments:
      - gamma
      - delta
      - psub
