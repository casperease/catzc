# Managed-GUID registry — the single authored source of every GUID literal the repository carries.
#
# Every GUID found in tracked text (code, configs, fixtures, pipelines, docs) must be registered here; the
# integrity gate enforces both directions — an unregistered guid fails the suite, and so does a dead entry
# no tracked file references. Two entry classes: an external-facing GUID is registered as-is (its value is
# fixed by the outside world); a placeholder GUID is minted with ConvertTo-Guid so the value spells its
# `sentence`.
#
# Loaded via Get-Config -Config guids; validated by Assert-GuidsConfig. Entry shape:
#   <snake_case_name>: { guid, description [, sentence] }
#
# cspell:ignore oilzstgq
guids:
  # -- external-facing: values fixed by the outside world --------------------------------------------------
  ado_oauth_resource:
    guid: 499b84ac-1321-427f-aa17-267ca6975798
    description: Azure DevOps well-known OAuth resource id (Get-AdoAuthorizationHeader default -ResourceUrl)
  ado_build_policy_type:
    guid: 0609b952-1397-4640-95ec-e00a01b2c241
    description: Azure DevOps well-known 'Build' policy type id — the discriminator every build-validation policy carries
  vs_csharp_project_type:
    guid: 9a19103f-16f7-4668-be54-9a1e7a4f7556
    description: Visual Studio SDK-style C# project-type id (catzc.sln)
  catzc_types_project:
    guid: 3f2a9c14-7b6d-4e58-9a21-0c5e8d4f1b2a
    description: the Catzc.Types.csproj project id in catzc.sln (the IDE-only mirror of the combined type assembly)

