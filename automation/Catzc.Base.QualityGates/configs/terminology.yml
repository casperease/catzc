# Terminology registry — the single authored source of approved repository vocabulary.
#
# Generated cspell word lists derive from this file (Build-TerminologyDictionary); never hand-edit
# those lists. Two roots: `categories:` defines the vocabulary classes, and `terms:` groups the words under
# them — `terms: <category>: [ { term, meaning }, ... ]`. A term's category is the group it sits in (no
# per-entry category field); an abbreviation entry also carries `expands_to`. See
# docs/adr/automation/spell-out-names.md (ADR-SPELL:5-ADR-SPELL:8).
#
# Loaded via Get-Config -Config terminology; validated by Catzc.Base.QualityGates.TerminologyConfig, which
# requires every term's category to be one defined here.

# categories — the allowed values for a term's `category`, each with what it means. This is the single
# source of the category set: the type validates every term against it, and Build-TerminologyDictionary
# emits one gitignored cspell dictionary (.cspell/<category>.txt) per category.
#
# Each category is a mapping with a required `description` and an OPTIONAL `scope` — a list of repo-relative
# `/`-separated globs DECLARING which domain a category's terms belong to (the test/example domain, the
# live/config domain, the design/ADR domain — see ADR-LANG). `scope` is a DECLARATION of intent, not a cspell
# rule: cspell tokenizes text, not meaning, and example/fixture vocabulary legitimately appears in comments,
# doc-example blocks, and demo data across every file type (a config comment illustrating `[acme, globex]`,
# a pipeline's `'Contoso Ltd'` demo record, a function's .EXAMPLE help), so a file-glob dictionary scope
# cannot separate "fixture-as-illustration" from "fixture-as-leaked-production-data". The domain separation
# is therefore enforced by ADR-TEST + code review (and, prospectively, a TAG-AWARE AST gate over test files —
# an extension of Get-TestTagViolations that inspects string literals, not comments), with `scope` as the
# machine-readable domain map that gate would consume. All categories are effectively GLOBAL to cspell today.
# See docs/adr/repository/domain-language-separation.md (ADR-LANG) and spell-out-names.md (ADR-SPELL).
categories:
  domain:
    description: 'General technical or computing vocabulary this codebase uses that fits no more specific category below.'
  abbreviation:
    description: 'A short form standing for a full word or phrase; carries expands_to with the full form.'
  fixture:
    description: 'A hermetic TEST token or documentation placeholder — a fixture identity or example value used in tests, doc examples, and comment-based-help EXAMPLE blocks, but NEVER in shipped config DATA (a *.yml/*.json/*.bicep under configs/ or infrastructure/). The test/example domain (ADR-LANG).'
    scope:
      - '**/tests/**'
      - 'docs/**'
      - '**/*.ps1'
      - '**/*.psm1'
  azure-live:
    description: 'A LIVE Azure identity — a real customer, subscription, org, or shipped-template name that the demo config maps to (the config/live domain, ADR-LANG). Guarded by integrity tests; forbidden in a logic test.'
    scope:
      - 'automation/Catzc.Azure*/configs/**'
      - 'infrastructure/**'
      - 'docs/**'
  adr-example:
    description: 'A DESIGN-domain example token — a discovery-theme name (discovery/expedition/survey, Contoso) or documentation placeholder used only in ADRs and reference docs (ADR-EXAMPLE, ADR-LANG).'
    scope:
      - 'docs/**'
  adr:
    description: 'An ADR rule-citation code — the short code naming a docs/adr rule.'
  ado:
    description: 'Azure DevOps vocabulary: predefined pipeline variables, REST area names, and logging commands.'
  azure:
    description: 'Azure and cloud infrastructure: regions, resource types, network topology, and environment or subscription tokens.'
  tool:
    description: 'An external tool, product, package manager, runtime, or file/data format.'
  platform:
    description: 'Operating-system, .NET, filesystem, registry, or low-level runtime and encoding vocabulary.'
  powershell:
    description: 'PowerShell language and runtime vocabulary — cmdlet/parameter names, automatic variables, and concepts.'
  coined:
    description: 'A word this codebase coined — a neologism (adjective, verb, or noun) not found in ordinary usage.'
  person:
    description: 'A cited author or thinker referenced in the docs.'

