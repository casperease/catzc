# Maps each ENABLED PSScriptAnalyzer rule that enforces an ADR rule to the rule id(s) it enforces, cited in
# the docs/adr/index.md '#' form (ADR-<CODE>#<n>). This is the source for the 'pssa-rule' enforcer kind in the
# Test-Automation rule-coverage report (Get-AnalyzerAdrCoverage): a rule listed here is credited as
# mechanically enforced on every run, because the L2 PSScriptAnalyzer gate runs inside Test-Automation.
#
# Both kinds appear: the custom Measure-* rules (automation/.scriptanalyzer/*.psm1) and the enabled built-ins.
# A rule that maps to no ADR is simply absent. Every custom analyzer rule MUST appear here (integrity-tested),
# so a new custom rule cannot ship unmapped; a built-in appears only when it genuinely enforces an ADR and is
# enabled in PSScriptAnalyzerSettings.psd1. Shape is validated at load (Assert-AnalyzerAdrMapConfig); id
# existence is checked by an integrity test, not at load (so config load stays hermetic — the ADR-CUSTOMER:3
# pattern).
analyzers:
    # Custom rules (automation/.scriptanalyzer)
    Measure-VariableCasing: [ADR-PSFORMAT#4]
    Measure-NeverDependOnPwd: [ADR-NOPWD#1, ADR-PSPWD#2]
    Measure-FunctionLength: [ADR-ONEJOB#4]
    Measure-NoWriteErrorOrWarning: [ADR-ERROR#3, ADR-ERROR#5]
    Measure-NoAzModuleNaming: [ADR-AZCLI#3]
    Measure-NoAutomaticVariableMisuse: [ADR-AUTOVAR#1]
    Measure-NoForEachObjectControlFlow: [ADR-FOREACH#3]
    Measure-NoRawVsoCommand: [ADR-PIPEVAR#1]
    Measure-NoRawPipelineDetection: [ADR-PIPEDET#1]
    Measure-NoRawInformationStream: [ADR-CONSOLE#2]
    Measure-SpellOutIdentifiers: [ADR-SPELL#9]

    # Enabled built-in rules that enforce an ADR
    PSUseApprovedVerbs: [ADR-VERBS#1]
    PSAvoidSemicolonsAsLineTerminators: [ADR-NOSEMI#1]
    PSPlaceOpenBrace: [ADR-PSFORMAT#2]
