# Root config registry — repository-root files fully managed by the source-of-truth automation. Each entry
# names ONE in-repo source of truth (`source`: an authored file copied out, or `generator`: a function that
# renders the content) and Build-RootConfig reproduces the target from it on every import.
#
# Two booleans, both defaulting to FALSE:
#   optIn      — is this file managed at all? Opt-out is the default: an entry with optIn false (or a root
#                file with no entry) stays hand-authored and committed.
#   committed  — is the managed target tracked in git? false = gitignored (reproduced on import, invisible
#                churn); true = committed (for files git or the bootstrap reads BEFORE the importer runs —
#                importer.ps1, the git files), where a source change surfaces as a reviewable diff.
#
# `comment` ('hash' | 'none', default 'none') picks the generated-file header for `source` copy-ins; a
# `generator` owns its whole output, header included, and takes no `comment`. All paths are repository-root-
# relative and forward-slashed (communication form; see docs/adr/automation/path-representation.md). Loaded
# via Get-Config -Config rootconfig; the shape is validated by Catzc.Base.RootConfig.RootConfigFiles. See
# docs/adr/repository/generated-root-configs.md.
files:
  - target: PSScriptAnalyzerSettings.psd1
    source: automation/.internal/assets/PSScriptAnalyzerSettings.psd1
    comment: hash
    optIn: true
  # importer.ps1 has TWO valid source-of-truth forms, swapped by editing this entry alone:
  #   generator: New-Importer  — the live form: the full shim, rendered from the Invoke-Importer overlay's
  #                              param block on every import (the drift guard in New-Importer.Tests.ps1).
  #   source: automation/Catzc.Base.RootConfig/assets/root/importer.ps1 (comment: none)
  #                            — the SEED form for a first check-in: a minimal bootstrap that just performs
  #                              one full import; the importer tail's Build-RootConfig then materialises
  #                              whatever THIS entry names, so switching back to the generator self-heals
  #                              the seed into the full shim on the very next load.
  - target: importer.ps1
    generator: New-Importer
    committed: true
    optIn: true
  - target: .vscode/settings.json
    generator: New-VSCodeSettings
    committed: true
    optIn: true
  - target: .editorconfig
    source: automation/Catzc.Base.RootConfig/assets/root/.editorconfig
    comment: hash
    optIn: true
  - target: .markdownlint.yml
    source: automation/Catzc.Base.RootConfig/assets/root/.markdownlint.yml
    comment: hash
    optIn: true
  - target: .markdownlintignore
    source: automation/Catzc.Base.RootConfig/assets/root/.markdownlintignore
    comment: hash
    optIn: true
  - target: .prettierrc.yml
    source: automation/Catzc.Base.RootConfig/assets/root/.prettierrc.yml
    comment: hash
    optIn: true
  - target: .prettierignore
    source: automation/Catzc.Base.RootConfig/assets/root/.prettierignore
    comment: hash
    optIn: true
  - target: cspell.yml
    source: automation/Catzc.Base.RootConfig/assets/root/cspell.yml
    comment: hash
    optIn: true
  - target: dotnet-tools.json
    source: automation/Catzc.Base.RootConfig/assets/root/dotnet-tools.json
    comment: none
    optIn: true
  - target: .gitattributes
    source: automation/Catzc.Base.RootConfig/assets/root/.gitattributes
    comment: hash
    committed: true
    optIn: true
  - target: .gitignore
    generator: New-GitIgnore
    committed: true
    optIn: true
