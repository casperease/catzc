# The globset registry — THE single source of truth mapping every area-of-control onto its files under
# version control (see docs/adr/pipelines/durable-sha-globs.md, ADR-GLOBS). Each set's canonical definition
# plus its durable SHA is persisted in .sha-markers/<name>.yml by Update-ShaMarker; pipelines and workflows
# path-filter on those marker files and on nothing else. Validated strictly on load by
# Catzc.Base.Globs.GlobsConfig.
#
# Every set declares its layer (ADR-GLOBS:7) — each layer a BOUNDARY in the repository: 'track' (a
# root-level partition: automation, infrastructure, and the 'repository' catch-all for everything else at
# root), 'deployable-unit' (a configurable unit that ships), or 'loose-fileset' (a cross-cutting check
# surface — a scan scope, an umbrella — that deliberately overlaps the boundaries it cuts across). The
# 'module' layer is derived from the folders (and the internal .psm1 files), never declared, and carries its
# own 'module-leftovers' catch-all — derived sets persist their own sha-markers too (ADR-PROTGLOB:7). Within
# every layer but 'loose-fileset' no two sets may select a common file on their OWN contribution — a track
# never consumes another track's files, a module never another module's (ADR-GLOBS:10); loose-filesets
# overlap freely. 'compose' unions another declared set's effective members into this one (acyclic,
# ADR-GLOBS:8). 'pipeline' names the pipeline bound to this set's marker — any layer may bind one.
#
# Dialect: '/'-separated, repo-relative; '**' is the only cross-segment operator (zero or more whole
# segments); within a segment, PowerShell wildcards ('*', '?', '[a-z]'), case-sensitive. Membership is
# include minus exclude, evaluated against `git ls-files`. No set may have a marker file as a member.
#
# Persistence (ADR-GLOBS, ADR-PROTGLOB:7) is a separate axis from mappability: EVERY set is always mappable
# (its durable-SHA identity is computed live for protection, blast-radius, and independence), but a committed
# .sha-markers/<name>.yml is written only for PERSISTED sets. The defaults are asymmetric: a DECLARED set
# (the entries below) persists by default — add 'persist: false' to an entry to opt it out (forbidden on a
# pipeline-bound set: its marker IS the trigger). A DERIVED module set (the per-folder aspect sets, internal
# .psm1 sets, reserved umbrellas, module-leftovers — never declared here) does NOT persist by default; list
# its derived marker name under the top-level 'persist_modules:' to opt it in. State only the non-default.

# persist_modules: derived module sets opted IN to marker persistence (empty by default -> no module markers).
#   e.g.  persist_modules: [catzc-base-globs-live]
persist_modules: []

globsets:
  # The automation track — the automation module system under automation/. A loose-fileset (ADR-GLOBS:7):
  # a cross-cutting check surface with a demonstrated use (the ci-automation pipeline binds its marker). It
  # overlaps the derived module sets it spans, which is exactly what the loose-fileset layer is for.
  automation:
    description: The automation track - the automation module system under automation/.
    layer: loose-fileset
    pipeline: ci-automation
    include:
      - automation/**

  # The infrastructure track — the Bicep IaC tree. A loose-fileset with a demonstrated use: ci-infrastructure
  # verifies it and the cd-* pipelines deploy from it; it overlaps the per-unit deployable sets below.
  infrastructure:
    description: The infrastructure track - the Bicep IaC tree, reusable modules and deployable templates.
    layer: loose-fileset
    pipeline: ci-infrastructure
    verify:
      modules: [Catzc.Azure.Templates]
      level: 2
    include:
      - infrastructure/**

  # The all-templates shared surface: every deployable template EXCEPT its deployment configuration —
  # the configuration-root (shared-platform) files and the per-customer subfolders — so this marker says
  # "template code changed" without firing on an individual deployment's config edit (the per-unit sets
  # below carry those).
  templates:
    description: All infrastructure templates' shared surface - every template excluding deployment configuration.
    layer: loose-fileset
    include:
      - infrastructure/templates/**
    exclude:
      - infrastructure/templates/*/configuration/*.yml
      - infrastructure/templates/*/configuration/*/**

  # The base deployable unit (ADR-GLOBS:7): the foundation template plus the shared Bicep modules, WITHOUT
  # any deployment configuration (the root files and the customer subfolders). It binds no pipeline of its
  # own — it ships only through a configured unit that composes it (apex/nova/flux/shared) — but carries the
  # template's verify blast-radius scope, and a change here re-keys every unit that composes it.
  template-azure-subscription-foundation:
    description: Deployable unit - the foundation infrastructure template plus the shared Bicep modules. Not including any configs!
    layer: deployable-unit
    verify:
      modules: [Catzc.Azure.Templates]
      level: 2
    include:
      - infrastructure/templates/foundation/**
      - infrastructure/modules/**
    exclude:
      - infrastructure/templates/foundation/configuration/*.yml
      - infrastructure/templates/foundation/configuration/*/**

  # Per-customer deployable units (ADR-TRACK:5): the shared surface plus that customer's own
  # configuration subfolder — the folder IS the customer key, so the unit is the exact folder name.
  # Adding a customer is adding an entry here — config, never code.
  nova:
    description: Deployable unit - customer nova's foundation (shared surface + the nova configuration folder).
    layer: deployable-unit
    pipeline: cd-nova
    compose: [template-azure-subscription-foundation]
    include:
      - infrastructure/templates/foundation/configuration/nova/**

  apex:
    description: Deployable unit - customer apex's foundation (shared surface + the apex configuration folder).
    layer: deployable-unit
    pipeline: cd-apex
    compose: [template-azure-subscription-foundation]
    include:
      - infrastructure/templates/foundation/configuration/apex/**

  flux:
    description: Deployable unit - customer flux's foundation (shared surface + the flux configuration folder).
    layer: deployable-unit
    pipeline: cd-flux
    compose: [template-azure-subscription-foundation]
    include:
      - infrastructure/templates/foundation/configuration/flux/**

  # The shared-platform unit — the configuration-ROOT files (the non-customer deployment), deployed by
  # cd-shared. The same shape as a customer unit, keyed by the root instead of a subfolder.
  shared:
    description: Deployable unit - the shared platform's foundation (shared surface + the configuration-root files).
    layer: deployable-unit
    pipeline: cd-shared
    compose: [template-azure-subscription-foundation]
    include:
      - infrastructure/templates/foundation/configuration/*.yml

  # The markdown scan scope: exactly what Test-Markdownlint reads - every in-scope markdown file plus the
  # scan's own config (a scan's globset includes its configuration). The excludes mirror the scan's default
  # negation globs. Consumed by the protected-glob gate: a repeated local scan is skipped while this set's
  # durable SHA is unchanged since the last green run in the session.
  markdown-scope:
    description: The markdown integrity scan's inputs - in-scope markdown plus the markdownlint config.
    layer: loose-fileset
    include:
      - '**/*.md'
      - .markdownlint.yml
    exclude:
      - docs/notes/**
      - automation/.vendor/**
