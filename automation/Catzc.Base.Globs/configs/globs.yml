# The globset registry — THE single source of truth mapping every deployable unit onto its files under
# version control (see docs/adr/pipelines/durable-sha-globs.md, ADR-GLOBS). Each set's durable SHA is
# persisted in .triggers/<name>.sha256 by Update-Trigger; pipelines and workflows path-filter on those
# trigger files and on nothing else. Validated strictly on load by Catzc.Base.Globs.GlobsConfig.
#
# Dialect: '/'-separated, repo-relative; '**' is the only cross-segment operator (zero or more whole
# segments); within a segment, PowerShell wildcards ('*', '?', '[a-z]'), case-sensitive. Membership is
# include minus exclude, evaluated against `git ls-files`. No set may have a trigger file as a member.

globsets:
  # The shared-fate CI unit: everything the CI engine's gates read — the automation layer, the docs the
  # spelling/markdown integrity scans cover, the pipeline definitions, this registry. Effectively the whole
  # tree minus the trigger files themselves, so ci-automation fires on any real change.
  automation:
    description: The shared-fate CI unit - every tracked file the CI engine verifies.
    include:
      - '**'
    exclude:
      - .triggers/**

  # The infrastructure delivery unit: what ci-infrastructure verifies and the cd-* pipelines deploy from.
  infrastructure:
    description: The Bicep IaC tree - reusable modules and deployable templates.
    include:
      - infrastructure/**

  # A per-deployable-unit example: the foundation template composed with the shared modules it deploys.
  foundation:
    description: Deployable unit - the foundation infrastructure template plus the shared Bicep modules.
    include:
      - infrastructure/templates/foundation/**
      - infrastructure/modules/**

  # The markdown scan scope: exactly what Test-Markdownlint reads - every in-scope markdown file plus the
  # scan's own config (a scan's globset includes its configuration). The excludes mirror the scan's default
  # negation globs. Consumed by the protected-glob gate: a repeated local scan is skipped while this set's
  # durable SHA is unchanged since the last green run in the session.
  markdown-scope:
    description: The markdown integrity scan's inputs - in-scope markdown plus the markdownlint config.
    include:
      - '**/*.md'
      - .markdownlint.yml
    exclude:
      - docs/notes/**
      - automation/.vendor/**
