# README copy-in registry — the single authored source for every generated README.md.
#
# Each generated `<folder>/README.md` is a copy-in of an authored docs `source`, with the source's relative
# links rebased to the target folder and a standard "generated file" warning injected after the title. The
# generated README is gitignored (the `source` under docs/ is what the markdown/spelling gates check) — NEVER
# edit a generated README; edit its `source` and re-run Build-Readme (the importer also runs it on every load).
# A folder NOT covered here keeps a hand-authored, committed README (opt-out) and is un-ignored in .gitignore.
#
# Two ways a folder gets a source:
#   patterns:  a glob whose every matched folder derives its source by CONVENTION — the `{kebab}` placeholder
#              is the matched folder's leaf name, lowercased with dots turned to hyphens
#              (automation/Catzc.Azure.DevOps -> docs/references/automation/catzc-azure-devops.md). Only a
#              trailing `/*` is supported: `<prefix>/*` matches the immediate, non-dot-prefixed subdirectories
#              of `<prefix>` (so .vendor/.internal/… never match). A matched folder whose derived source does
#              not exist is skipped (no README generated), so a module with no reference article yet is fine.
#   mappings:  an explicit folder -> source entry for a folder that does not follow a convention. An explicit
#              mapping WINS over any pattern that also matches its folder.
#
# All paths are repository-root-relative and forward-slashed (communication form; see
# docs/adr/automation/path-representation.md). Loaded via Get-Config -Config readme; the shape is validated by
# Catzc.Base.Docs.DocsConfig and the patterns are expanded by Get-ReadmeMappings. See
# docs/adr/repository/generated-readmes.md.
patterns:
  - glob: automation/*
    source: docs/references/automation/{kebab}.md
mappings:
  - folder: pipelines
    source: docs/references/pipelines.md
  - folder: infrastructure
    source: docs/references/infrastructure/overview.md
  - folder: infrastructure/modules
    source: docs/references/infrastructure/modules.md
  - folder: infrastructure/templates/foundation
    source: docs/references/infrastructure/foundation.md
  # Every .gitkeep folder is backed by a reference article (the Build-GitKeep integrity gate) — the generic
  # .gitkeep points at the README these mappings copy in. The three template-kind folders share one source.
  - folder: out
    source: docs/references/out.md
  - folder: contracts
    source: docs/references/contracts.md
  - folder: pipelines/jobs
    source: docs/references/pipelines/template-folders.md
  - folder: pipelines/stages
    source: docs/references/pipelines/template-folders.md
  - folder: pipelines/variables
    source: docs/references/pipelines/template-folders.md
