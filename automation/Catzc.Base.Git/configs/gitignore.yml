# Gitignore registry — the single source of truth for the repository-root .gitignore. New-GitIgnore renders
# these zones (in order) into the zoned, commented .gitignore, which is itself a managed, COMMITTED root file
# (Build-RootConfig materialises it on import; see rootconfig.yml and docs/adr/repository/generated-root-configs.md).
#
# Each zone is a titled, explained group: `title` + `why` render as the zone's comment block, `patterns` are
# verbatim git wildmatch lines (a bare string, or { pattern, note } for an aligned trailing comment). A zone
# with `inject: <provider>` takes its patterns from the caller at render time instead — the root-config zone
# is injected from rootconfig.yml's committed:false targets, so that list is never restated here.
#
# Loaded via Get-Config -Config gitignore; the shape is validated by Catzc.Base.Git.GitIgnoreConfig.
zones:
  - id: local
    title: Local, never-committed files
    why: >
      Per-machine working files: local agent instructions and MCP wiring, scratch folders, editor backups,
      and the occasional bash-on-Windows crash dump.
    patterns:
      - .claude/CLAUDE.local.md
      - .mcp.json
      - tmp
      - '*.bkp'
      - bash.exe.stackdump

  - id: output
    title: Output directory
    why: >
      All generated artifacts land in out/ (see docs/adr/repository/dedicated-output-directory.md). The
      folder itself is kept so a fresh checkout has the anchor; its contents never enter git.
    patterns:
      - out/*
      - { pattern: '!out/.gitkeep', note: 'keep the folder, ignore its contents' }

  - id: manifests
    title: Generated module manifests
    why: >
      Every module's <Module>.psd1 is generated by the loader on import (open-closed architecture) — derived,
      never committed. Vendored third-party modules ship their own authored manifests, and the authored
      analyzer config under .internal/assets is a config file that merely shares the extension, so both opt
      back in past the glob.
    patterns:
      - automation/**/*.psd1
      - { pattern: '!automation/.vendor/**/*.psd1', note: 'vendored modules ship their own manifests' }
      - { pattern: '!automation/.internal/assets/PSScriptAnalyzerSettings.psd1', note: 'authored analyzer source' }

  - id: root-config
    title: Managed root-config copies
    why: >
      Repository-root config files fully managed by Catzc.Base.RootConfig — each reproduced on import from
      its one in-repo source of truth (see rootconfig.yml). Edit the source, never the root copy; this list
      is injected from the registry's committed:false targets and never restated by hand.
    inject: rootconfig-committed-false

  - id: readmes
    title: Generated README copy-ins
    why: >
      A README.md in a mapped conventional folder is a generated copy-in of an authored docs source
      (Build-Readme, Catzc.Base.Docs; see docs/adr/repository/generated-readmes.md) — derived artifacts like
      the module manifests, regenerated on every import. Hand-authored READMEs are exactly the unmapped
      folders and opt back in below. The generated cspell dictionaries under .cspell/ are ignored by
      .cspell/.gitignore, so only that folder's README and its .gitignore are committed.
    patterns:
      - '**/README.md'
      - '!.github/README.md'
      - '!docs/adr/README.md'
      - '!automation/.vendor/**/README.md'
      - '!automation/Catzc.Base.Environment/assets/README.md'
      - '!automation/Catzc.Azure.Templates/tests/assets/README.md'
      - '!.cspell/README.md'

  - id: compiled-types
    title: Compiled C# types — transient temp only
    why: >
      The combined compiled assembly (automation/.compiled/Catzc.Types.<hash>.dll) is COMMITTED — a vendored,
      hash-keyed prebuild that lets a fresh checkout and CI load without compiling (see
      docs/adr/automation/caching.md). Only the concurrent-compile temp file is ignored.
    patterns:
      - automation/.compiled/*.tmp

  - id: ide-build
    title: IDE-only C# project build output
    why: >
      The root catzc.sln references automation/.internal/assets/Catzc.Types.csproj for editor tooling, and
      MSBuild emits obj/bin next to that project. The runtime never builds it (Add-Type compiles the type
      sources at import), so its MSBuild artifacts are transient.
    patterns:
      - automation/.internal/assets/obj/
      - automation/.internal/assets/bin/
